- name: "Dr. Sean P. Spencer"
  role: "Principal Investigator"
  photo: "/assets/images/people/spencer_lab.jpg"
  bio: "Gastroenterologist and Physician Scientist at Stanford University"
  full_bio: >
    "Sean Spencer, MD,PhD is a Gastroenterologist and Physician Scientist —
    at Stanford University working to uncover the role of dietary intake 
    and the gut microbiome in gastrointestinal disease. Sean obtained his 
    medical degree University of Pennsylvania, earning his PhD studying 
    nutritional immunology with Yasmine Belkaid, PhD at the National Institutes of Health (NIH),
    after which he moved to Boston for residency training at Massachusetts General Hospital
    and completed his Gastroenterology training at Stanford University where he studied 
    fermented food-immune interactions in the lab of Justin Sonnenburg, PhD. Sean has 
    launched a microbiome-focused clinical practice and laboratory at Stanford where he employs 
    novel diagnostic and therapeutic modalities to better understand and treat his patients with GI disease." 
  link: "seanspen@stanford.edu"

- name: "Annika Weber"
  role: "Postdoctoral Scholar"
  photo: "/assets/images/people/AW.jpeg"
  bio: "Postdoctoral scholar focused on prebiotic metabolization of fiber."
  full_bio: >
    Annika is a postdoctoral scholar in the Spencer Lab studying how gut microbes metabolize prebiotic fibers 
    to produce bioactive metabolites linked to lowering disease risk. She holds an MS in Human Nutrition from 
    the University of Sheffield and a PhD in Food Science and Human Nutrition from Colorado State University. 
    Her work integrates multi-omic approaches to map diet-microbe-metabolite relationships. Annika aims to 
    translate these mechanistic insights into microbiome-informed dietary strategies for reducing chronic diseases.
  link: "amweber@stanford.edu"

- name: "Roujheen Sabetan"
  role: "Clinical Research Co-ordinator 2"
  photo: ""
  bio: "Clinical Research Coordinator who joined the Spencer Lab in February 2026."
  full_bio: >
    Roujheen earned her Master of Public Health in Nutrition from UC Berkeley and brings over five years of research 
    experience, primarily focused on nutrition and the microbiome. Prior to joining the Spencer Lab, she worked with 
    the Nutrition Studies Research Group at Stanford as a Study Coordinator, where she supported multiple projects 
    ranging from maternal and infant microbiome interventions to diet-based cancer prevention research in firefighters. 
    Beyond her research work, Roujheen enjoys experimenting with new recipes and participating in grassroots community building efforts..
  link: "rsabetan@stanford.edu"

- name: "Aubrey Adiao"
  role: "Clinical Research Co-ordinator 2"
  photo: ""
  bio: "Certified Clinical Research Coordinator who joined the Spencer Lab in November 2025."
  full_bio: >
     Aubrey brings over 12 years of human subjects research experience and previously worked on studies from a variety 
     of disciplines such as Psychology, Neonatology, Infectious Diseases, and Oncology before hitting her stride in 
     Gastroenterology and Hepatology. Aubrey is a Bay Area native and aspires in her career to bring opportunities for 
     novel treatments and therapies to her local communities, especially the underserved and underrepresented. In 
     her spare time, she loves to spend time with her husband and loved ones, travel, and defend her 1000+ day Duolingo streak.
  link: "aadiao@stanford.edu"

