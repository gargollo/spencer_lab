- name: "Maria Gargollo"
  role: "Master's Student"
  photo: ""
  bio: "MTRAM student at Stanford."
  full_bio: >
   Maria is a Master’s student in Translational Research and Applied Medicine at Stanford School of Medicine. 
   Her academic and professional interests lie at the intersection of biomedical innovation and regulatory science. Her main 
   focus is on how regulatory strategy can accelerate access to safe and effective therapies, microbiome based interventions and 
   preventative measures. Through her training both on the bench and the pharmaceutical sector, she has gained experience in 
   clinical research design, scientific communication and cross-disciplinary collaboration. She aims to build a career that 
   bridges scientific discovery and regulatory decision-making to bring science based solutions to patients.
  link: "gargollo@stanford.edu"

