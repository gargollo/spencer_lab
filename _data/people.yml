- name: "Dr. Sean P. Spencer"
  role: "Principal Investigator"
  photo: "/assets/images/people/spencer_lab.jpg"
  bio: "Sean Spencer, MD,PhD is a Gastroenterologist and Physician Scientist at Stanford University working to uncover the role of dietary intake on the gut microbiome and mucosal immune system. Sean obtained his medical degree University of Pennsylvania, earning his PhD studying nutritional immunology with Yasmine Belkaid,PhD at the National Institutes of Health (NIH), after which he moved to Boston for residency training at Massachusetts General Hospital and completed his Gastroenterology training at Stanford University. Sean’s career goal is to study mechanisms by which dietary intake influences our microbiome and immune system to better understand and treat gastrointestinal disease. Sean has launched a microbiome-focused clinical practice at Stanford where he is working to develop novel microbiome diagnostics and microbial medicines."
  link: ""

