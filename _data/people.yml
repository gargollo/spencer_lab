- name: "William Rubin"
  role: "LSRP 1"
  photo: ""
  bio: " Bio"
  full_bio: >
    Will is a Life Science Research Professional who joined the Spencer Lab in July 2026. 
    He holds a BS in Biology and Applied Physics and an MS in Biology from Tufts University. 
    Prior to his work in the Spencer Lab, he contributed to research on microbial ecology in 
    cheese rinds at Tufts and worked in a fermentation lab at a Napa Valley winery. He's currently 
    assisting in research focused on the development of fermented food-based therapies to improve 
    immune health. Outside of the lab, he enjoys hiking, playing piano, and trying new restaurants.
  link: "wrubin@stanford.edu"