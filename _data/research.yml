# Research focus areas shown on the Research page.
# Add, remove, or edit entries below — each becomes one card.
# "title" is the short name, "summary" is 1-3 sentences.

- title: "Diet"
  summary: >
    Food is one of the most powerful levers we have to reshape the gut microbiome, 
    and we want to know how. We characterize the interactions between specific 
    dietary components — fibers, metabolites, and nutrients — and microbial communities 
    to develop evidence-based nutritional interventions. This work supports our broader 
    goal of using diet as a scalable, accessible therapy for GI and metabolic health.

- title: "Microbes"
  summary: >
   Our lab characterizes the bacteria that inhabit the human gut, examining their biology, 
   behavior, and the roles they play in health and disease. By understanding how microbes 
   function individually and as communities, we identify strains with the potential to become 
   live bacterial therapeutics. This microbial insight forms the foundation of our drug 
   development pipeline.

- title: "Host"
  summary: >
    We examine how the host — through immune, metabolic, and physiological pathways — responds 
    to and shapes both diet and the gut microbiome. This three-way relationship between host, 
    diet, and microbes is central to understanding chronic GI conditions and identifying points 
    of therapeutic intervention. Our research integrates host biology into every stage of our 
    translational pipeline, from bacteria to bedside.
